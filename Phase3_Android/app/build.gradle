plugins {
    id 'com.android.application'
}

android {
    namespace 'com.virtualmouse.ai'
    compileSdk 34

    defaultConfig {
        applicationId "com.virtualmouse.ai"
        minSdk 24
        targetSdk 34
        versionCode 1
        versionName "1.0"
    }
    buildTypes {
        release {
            minifyEnabled false
        }
    }
}

dependencies {
    implementation 'androidx.appcompat:appcompat:1.6.1'
    implementation 'com.google.android.material:material:1.9.0'
    implementation 'androidx.constraintlayout:constraintlayout:2.1.4'
}
